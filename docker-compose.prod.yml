version: '3.8'

services:
  backend:
    build: ./backend
    container_name: palliativ_backend
    environment:
      - DATABASE_URL=file:/data/dev.db
      - JWT_SECRET=super-secret-palliativ-key
      - PORT=3000
    volumes:
      - sqlite_data:/data
    restart: always
    networks:
      - app_network

  frontend:
    build: ./frontend
    container_name: palliativ_frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.palliativ.rule=Host(`palli.graef-ai-consulting.de`)"
      - "traefik.http.routers.palliativ.entrypoints=websecure"
      - "traefik.http.routers.palliativ.tls.certresolver=mytlschallenge"
      - "traefik.http.services.palliativ.loadbalancer.server.port=80"
    depends_on:
      - backend
    restart: always
    networks:
      - app_network
      - shared_services

networks:
  app_network:
    driver: bridge
  shared_services:
    external: true

volumes:
  sqlite_data:
