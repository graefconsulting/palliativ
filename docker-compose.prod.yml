version: '3.8'

services:
  backend:
    build: ./backend
    container_name: palliativ_backend
    environment:
      - DATABASE_URL=file:/data/dev.db
      - JWT_SECRET=super-secret-palliativ-key
      - PORT=3000
    volumes:
      - sqlite_data:/data
    restart: always
    networks:
      - app_network

  frontend:
    build: ./frontend
    container_name: palliativ_frontend
    ports:
      - "81:80"
    depends_on:
      - backend
    restart: always
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  sqlite_data:
